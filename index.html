<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Check Stock</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-6xl mx-auto p-5">

    <div class="bg-white rounded-3xl shadow-xl p-6">

      <h1 class="text-3xl font-bold mb-2">
        Check Stock L257
      </h1>

      <p class="text-gray-500 mb-6">
        Cari PLU, Barcode, atau Deskripsi
      </p>

      <!-- SEARCH -->
      <input
        type="text"
        id="search"
        placeholder="Cari produk..."
        class="w-full border rounded-2xl px-4 py-3 mb-5 outline-none"
      >

      <div class="text-sm text-gray-500 mb-5">
        Total Produk:
        <span id="totalData">0</span>
      </div>

      <!-- LIST -->
      <div
        id="productList"
        class="space-y-3"
      ></div>

    </div>

  </div>

  <script>

    let products = []

    // CORS FIX
    const API_URL =
      "https://api.allorigins.win/raw?url=" +
      encodeURIComponent(
        "https://app.alfastore.co.id/prd/api/cex/get_product_list/?storeId=L257"
      )

    async function loadProducts() {

      try {

        const response =
          await fetch(API_URL)

        const data =
          await response.json()

        console.log(data)

        products = data

        document.getElementById("totalData").innerText =
          products.length

        renderProducts(products)

      }
      catch (err) {

        console.error(err)

        alert("Gagal load API")

      }

    }

    function renderProducts(data) {

      const list =
        document.getElementById("productList")

      list.innerHTML = ""

      data.slice(0, 100).forEach((item) => {

        list.innerHTML += `
          <div class="bg-gray-50 rounded-2xl p-4">

            <div class="font-semibold">
              ${item.desc}
            </div>

            <div class="text-sm text-gray-500 mt-2">
              PLU: ${item.plu}
            </div>

            <div class="text-sm text-gray-500">
              Barcode: ${item.barcode}
            </div>

          </div>
        `

      })

    }

    // SEARCH

    document
      .getElementById("search")
      .addEventListener("input", function () {

        const keyword =
          this.value.toLowerCase()

        const filtered =
          products.filter((item) => {

            return (

              String(item.plu)
                .toLowerCase()
                .includes(keyword)

              ||

              String(item.barcode)
                .toLowerCase()
                .includes(keyword)

              ||

              String(item.desc)
                .toLowerCase()
                .includes(keyword)

            )

          })

        renderProducts(filtered)

      })

    loadProducts()

  </script>

</body>
</html>
