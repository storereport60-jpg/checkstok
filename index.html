<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Check Stock L257</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>

<body>

  <div class="max-w-7xl mx-auto p-5">

    <div class="bg-white rounded-3xl shadow-xl p-6">

      <div class="mb-6">
        <h1 class="text-3xl font-bold">
          Check Stock L257
        </h1>

        <p class="text-gray-500 mt-2">
          Search PLU, Barcode, atau Deskripsi Produk
        </p>
      </div>

      <!-- SEARCH -->
      <div class="flex gap-3 mb-5">

        <input
          type="text"
          id="search"
          placeholder="Cari PLU / Barcode / Deskripsi"
          class="flex-1 border rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-black"
        />

        <button
          onclick="loadProducts()"
          class="bg-black text-white px-5 py-3 rounded-2xl"
        >
          Refresh
        </button>

      </div>

      <div class="text-sm text-gray-500 mb-4">
        Total Produk:
        <span id="totalData">0</span>
      </div>

      <!-- LOADING -->
      <div
        id="loading"
        class="hidden bg-blue-50 text-blue-700 rounded-2xl p-4 mb-4"
      >
        Loading produk...
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

        <!-- LIST -->
        <div class="bg-gray-50 rounded-3xl p-4 h-[700px] overflow-auto scrollbar-hide">

          <h2 class="font-semibold text-lg mb-4">
            Hasil Pencarian
          </h2>

          <div id="productList" class="space-y-3"></div>

        </div>

        <!-- DETAIL -->
        <div class="bg-gray-50 rounded-3xl p-5">

          <h2 class="font-semibold text-lg mb-4">
            Detail Produk
          </h2>

          <div
            id="detail"
            class="text-gray-400 text-center py-20"
          >
            Pilih produk untuk melihat detail
          </div>

        </div>

      </div>

    </div>

  </div>

  <script>

    let products = []

    const API_URL =
      "https://app.alfastore.co.id/prd/api/cex/get_product_list/?storeId=L257"

    async function loadProducts() {

      try {

        document
          .getElementById("loading")
          .classList.remove("hidden")

        const response = await fetch(API_URL)

        const result = await response.json()

        if (Array.isArray(result)) {
          products = result
        }
        else if (result.data) {
          products = result.data
        }
        else if (result.products) {
          products = result.products
        }

        document.getElementById("totalData").innerText =
          products.length

        renderProducts(products.slice(0, 50))

      }
      catch (err) {

        console.error(err)

        alert(
          "API kemungkinan terkena CORS.\nGunakan backend proxy."
        )

      }
      finally {

        document
          .getElementById("loading")
          .classList.add("hidden")

      }

    }

    function renderProducts(data) {

      const list =
        document.getElementById("productList")

      list.innerHTML = ""

      if (data.length === 0) {

        list.innerHTML = `
          <div class="text-center py-10 text-gray-400">
            Produk tidak ditemukan
          </div>
        `

        return
      }

      data.forEach((item) => {

        const desc =
          item.description ||
          item.desc ||
          item.DESCRIPTION ||
          item.DESKRIPSI ||
          "Tidak ada deskripsi"

        const plu =
          item.plu ||
          item.PLU ||
          "-"

        const barcode =
          item.barcode ||
          item.BARCODE ||
          "-"

        const card = document.createElement("button")

        card.className =
          "w-full bg-white rounded-2xl p-4 text-left hover:shadow-md transition"

        card.innerHTML = `
          <div class="font-semibold text-sm mb-2">
            ${desc}
          </div>

          <div class="text-xs text-gray-500 space-y-1">
            <div>PLU: ${plu}</div>
            <div>Barcode: ${barcode}</div>
          </div>
        `

        card.onclick = () => showDetail(item)

        list.appendChild(card)

      })

    }

    function showDetail(item) {

      const detail =
        document.getElementById("detail")

      let html = `
        <div class="space-y-4 text-left">
      `

      for (const key in item) {

        html += `
          <div class="bg-white rounded-2xl p-4">
            <div class="text-xs text-gray-500 mb-1">
              ${key}
            </div>

            <div class="font-medium break-all">
              ${item[key]}
            </div>
          </div>
        `
      }

      html += `</div>`

      detail.innerHTML = html

    }

    document
      .getElementById("search")
      .addEventListener("input", function () {

        const keyword =
          this.value.toLowerCase()

        if (!keyword) {

          renderProducts(products.slice(0, 50))
          return

        }

        const filtered =
          products.filter((item) => {

            const plu =
              String(item.plu || item.PLU || "")

            const barcode =
              String(item.barcode || item.BARCODE || "")

            const desc =
              String(
                item.description ||
                item.desc ||
                item.DESCRIPTION ||
                item.DESKRIPSI ||
                ""
              ).toLowerCase()

            return (
              plu.includes(keyword) ||
              barcode.includes(keyword) ||
              desc.includes(keyword)
            )

          })

        renderProducts(filtered.slice(0, 50))

      })

    loadProducts()

  </script>

</body>
</html>
