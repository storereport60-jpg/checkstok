<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Check Stock L257</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-7xl mx-auto p-5">

    <div class="bg-white rounded-3xl shadow-xl p-6">

      <h1 class="text-3xl font-bold mb-2">
        Check Stock L257
      </h1>

      <p class="text-gray-500 mb-6">
        Search PLU, Barcode, atau Deskripsi
      </p>

      <!-- SEARCH -->
      <div class="flex gap-3 mb-5">

        <input
          type="text"
          id="search"
          placeholder="Cari produk..."
          class="flex-1 border rounded-2xl px-4 py-3 outline-none"
        >

        <button
          onclick="loadProducts()"
          class="bg-black text-white px-5 rounded-2xl"
        >
          Refresh
        </button>

      </div>

      <div class="text-sm text-gray-500 mb-4">
        Total Produk:
        <span id="totalData">0</span>
      </div>

      <!-- LIST -->
      <div
        id="productList"
        class="space-y-3"
      ></div>

    </div>

  </div>

  <script>

    let products = []

    // =========================
    // PROXY CORS
    // =========================

    const API_URL =
      "https://corsproxy.io/?https://app.alfastore.co.id/prd/api/cex/get_product_list/?storeId=L257"

    // =========================

    async function loadProducts() {

      try {

        const response =
          await fetch(API_URL)

        const result =
          await response.json()

        if (Array.isArray(result)) {
          products = result
        }
        else if (result.data) {
          products = result.data
        }
        else if (result.products) {
          products = result.products
        }

        document.getElementById("totalData").innerText =
          products.length

        renderProducts(products)

      }
      catch (err) {

        console.error(err)

        alert("Gagal load API")

      }

    }

    function renderProducts(data) {

      const list =
        document.getElementById("productList")

      list.innerHTML = ""

      data.slice(0, 50).forEach((item) => {

        const desc =
          item.description ||
          item.desc ||
          item.DESCRIPTION ||
          item.DESKRIPSI ||
          "-"

        const plu =
          item.plu ||
          item.PLU ||
          "-"

        const barcode =
          item.barcode ||
          item.BARCODE ||
          "-"

        list.innerHTML += `
          <div class="bg-gray-50 rounded-2xl p-4">

            <div class="font-semibold mb-2">
              ${desc}
            </div>

            <div class="text-sm text-gray-500">
              PLU: ${plu}
            </div>

            <div class="text-sm text-gray-500">
              Barcode: ${barcode}
            </div>

          </div>
        `

      })

    }

    document
      .getElementById("search")
      .addEventListener("input", function () {

        const keyword =
          this.value.toLowerCase()

        const filtered =
          products.filter((item) => {

            const plu =
              String(item.plu || item.PLU || "")

            const barcode =
              String(item.barcode || item.BARCODE || "")

            const desc =
              String(
                item.description ||
                item.desc ||
                item.DESCRIPTION ||
                item.DESKRIPSI ||
                ""
              ).toLowerCase()

            return (
              plu.includes(keyword) ||
              barcode.includes(keyword) ||
              desc.includes(keyword)
            )

          })

        renderProducts(filtered)

      })

    loadProducts()

  </script>

</body>
</html>
