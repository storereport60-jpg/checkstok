<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Check Stock L257</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-7xl mx-auto p-5">

    <div class="bg-white rounded-3xl shadow-xl p-6">

      <h1 class="text-3xl font-bold mb-2">
        Check Stock L257
      </h1>

      <p class="text-gray-500 mb-6">
        Search PLU, Barcode, atau Deskripsi
      </p>

      <!-- SEARCH -->
      <div class="flex gap-3 mb-5">

        <input
          type="text"
          id="search"
          placeholder="Cari produk..."
          class="flex-1 border rounded-2xl px-4 py-3 outline-none"
        >

        <button
          id="refreshBtn"
          class="bg-black text-white px-5 rounded-2xl"
        >
          Refresh
        </button>

      </div>

      <div class="text-sm text-gray-500 mb-4">
        Total Produk:
        <span id="totalData">0</span>
      </div>

      <div
        id="loading"
        class="hidden bg-blue-50 text-blue-700 rounded-2xl p-4 mb-4"
      >
        Loading produk...
      </div>

      <!-- LIST -->
      <div
        id="productList"
        class="space-y-3"
      ></div>

    </div>

  </div>

  <script>

    let products = []

    // =========================
    // API PROXY
    // =========================

    const API_URL =
      "https://corsproxy.io/?https://app.alfastore.co.id/prd/api/cex/get_product_list/?storeId=L257"

    // =========================

    async function loadProducts() {

      try {

        document
          .getElementById("loading")
          .classList.remove("hidden")

        const response =
          await fetch(API_URL)

        const text =
          await response.text()

        let result = []

        try {

          result = JSON.parse(text)

        }
        catch {

          console.log(text)

          alert(
            "Response API bukan JSON.\nCek console browser."
          )

          return
        }

        if (Array.isArray(result)) {

          products = result

        }
        else if (result.data) {

          products = result.data

        }
        else if (result.products) {

          products = result.products

        }
        else {

          products = []

        }

        document.getElementById("totalData").innerText =
          products.length

        renderProducts(products)

      }
      catch (err) {

        console.error(err)

        alert(
          "Gagal load API.\nKemungkinan proxy diblok."
        )

      }
      finally {

        document
          .getElementById("loading")
          .classList.add("hidden")

      }

    }

    function renderProducts(data) {

      const list =
        document.getElementById("productList")

      list.innerHTML = ""

      if (data.length === 0) {

        list.innerHTML = `
          <div class="text-center text-gray-400 py-10">
            Tidak ada data
          </div>
        `

        return
      }

      data.slice(0, 50).forEach((item) => {

        const desc =
          item.description ||
          item.desc ||
          item.DESCRIPTION ||
          item.DESKRIPSI ||
          "-"

        const plu =
          item.plu ||
          item.PLU ||
          "-"

        const barcode =
          item.barcode ||
          item.BARCODE ||
          "-"

        const div =
          document.createElement("div")

        div.className =
          "bg-gray-50 rounded-2xl p-4"

        div.innerHTML = `
          <div class="font-semibold mb-2">
            ${desc}
          </div>

          <div class="text-sm text-gray-500">
            PLU: ${plu}
          </div>

          <div class="text-sm text-gray-500">
            Barcode: ${barcode}
          </div>
        `

        list.appendChild(div)

      })

    }

    // SEARCH

    document
      .getElementById("search")
      .addEventListener("input", function () {

        const keyword =
          this.value.toLowerCase()

        if (!keyword) {

          renderProducts(products)
          return

        }

        const filtered =
          products.filter((item) => {

            const plu =
              String(item.plu || item.PLU || "")

            const barcode =
              String(item.barcode || item.BARCODE || "")

            const desc =
              String(
                item.description ||
                item.desc ||
                item.DESCRIPTION ||
                item.DESKRIPSI ||
                ""
              ).toLowerCase()

            return (
              plu.includes(keyword) ||
              barcode.includes(keyword) ||
              desc.includes(keyword)
            )

          })

        renderProducts(filtered)

      })

    // BUTTON

    document
      .getElementById("refreshBtn")
      .addEventListener("click", loadProducts)

    // AUTO LOAD

    loadProducts()

  </script>

</body>
</html>
